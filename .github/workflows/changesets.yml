name: Changesets

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  packages: write

jobs:
  changesets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.4.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Ensure npm supports trusted publishing
        shell: bash
        run: |
          npm install -g npm@^11.5.1
          node -v
          npm -v
          pnpm -v

      - name: Get pnpm store directory
        id: get-pnpm-store-path
        shell: bash
        run: echo "store_path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        id: pnpm-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.get-pnpm-store-path.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.pnpm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache dependencies
        if: steps.pnpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            **/node_modules
          key: ${{ steps.pnpm-cache.outputs.cache-primary-key }}

      - name: Build packages
        run: pnpm turbo run build

      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
          version: pnpm changeset version
          publish: pnpm changeset publish
          createGithubReleases: true     # 릴리즈 생성 활성화
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
